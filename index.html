<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ent333 | 엔트리 데이터 조회</title>
    <style>
        :root { --primary: #3b82f6; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 450px; }
        h1 { text-align: center; color: var(--primary); font-size: 28px; margin-bottom: 8px; }
        p.subtitle { text-align: center; font-size: 14px; color: #64748b; margin-bottom: 24px; }
        
        .search-area { display: flex; gap: 8px; margin-bottom: 24px; }
        input { flex: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }

        #result { display: none; animation: fadeIn 0.4s ease; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-card span { display: block; font-size: 12px; color: #64748b; margin-bottom: 4px; }
        .stat-card strong { font-size: 18px; color: var(--text); }
        .full-width { grid-column: span 2; background: #eff6ff; border: 1px solid #dbeafe; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>ent333</h1>
    <p class="subtitle">엔트리 유저 실시간 데이터 분석</p>

    <div class="search-area">
        <input type="text" id="target-id" placeholder="엔트리 아이디 입력" onkeypress="if(event.keyCode==13) search()">
        <button onclick="search()">조회</button>
    </div>

    <div id="result">
        <div class="stat-grid">
            <div class="stat-card full-width">
                <span>닉네임</span>
                <strong id="res-nickname">-</strong>
            </div>
            <div class="stat-card">
                <span>팔로워</span>
                <strong id="res-follower">0</strong>
            </div>
            <div class="stat-card">
                <span>팔로잉</span>
                <strong id="res-following">0</strong>
            </div>
            <div class="stat-card">
                <span>작품 수</span>
                <strong id="res-projects">0</strong>
            </div>
            <div class="stat-card">
                <span>게시글 수</span>
                <strong id="res-posts">0</strong>
            </div>
        </div>
    </div>
</div>

<script>
    async function search() {
        const id = document.getElementById('target-id').value;
        if(!id) return alert("아이디를 입력해주세요.");

        const btn = document.querySelector('button');
        btn.innerText = "조회중...";
        btn.disabled = true;

        // CORS 우회를 위한 프록시 사용
        const target = `https://playentry.org/api/getUserByUsername/${id}`;
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;

        try {
            const res = await fetch(proxy);
            const rawData = await res.json();
            const data = JSON.parse(rawData.contents);

            if(!data || data.error || !data.nickname) {
                alert("존재하지 않는 유저이거나 탈퇴한 계정입니다.");
            } else {
                document.getElementById('result').style.display = 'block';
                document.getElementById('res-nickname').innerText = data.nickname;
                document.getElementById('res-follower').innerText = data.followerCount.toLocaleString();
                document.getElementById('res-following').innerText = data.followingCount.toLocaleString();
                document.getElementById('res-projects').innerText = data.projectCount.toLocaleString();
                document.getElementById('res-posts').innerText = data.discussCount.toLocaleString();
            }
        } catch (e) {
            alert("서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.");
        } finally {
            btn.innerText = "조회";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
