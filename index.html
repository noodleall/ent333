<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ent333 | GraphQL Edition</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #0a0a0c; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #16161a; padding: 30px; border-radius: 20px; width: 380px; box-shadow: 0 0 30px rgba(0,255,136,0.1); border: 1px solid #2d2d33; }
        h1 { color: #00ff88; text-align: center; font-size: 26px; letter-spacing: -1px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #00ff88; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #00ff88; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00cc6e; transform: scale(1.02); }
        #res { margin-top: 25px; display: none; border-top: 1px solid #333; padding-top: 20px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .label { color: #888; }
        .value { font-weight: bold; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>ent333 <span style="font-size: 12px; color: #555;">v2.0</span></h1>
    <input type="text" id="targetId" placeholder="엔트리 아이디 입력">
    <button onclick="queryEntry()">데이터 조회</button>

    <div id="res">
        <div class="data-row"><span class="label">닉네임</span><span class="value" id="nick">-</span></div>
        <div class="data-row"><span class="label">팔로워</span><span class="value" id="fol">-</span></div>
        <div class="data-row"><span class="label">팔로잉</span><span class="value" id="ing">-</span></div>
        <div class="data-row"><span class="label">아이디 고유값</span><span class="value" id="uid" style="font-size: 10px; color: #00ff88;">-</span></div>
    </div>
</div>

<script>
    async function queryEntry() {
        const id = document.getElementById('targetId').value;
        if(!id) return alert("아이디를 입력하세요!");

        const btn = document.querySelector('button');
        btn.innerText = "GraphQL 통신 중...";

        // 엔트리 GraphQL 쿼리문
        const operations = {
            query: `query getUser($username: String) {
                user(username: $username) {
                    nickname
                    followerCount
                    followingCount
                    _id
                }
            }`,
            variables: { username: id }
        };

        // 보안 우회를 위한 프록시 (GraphQL은 POST 요청이라 설정이 약간 다릅니다)
        const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://playentry.org/graphql');

        try {
            // 실제로는 POST로 쏴야 하지만, 프록시 제한 때문에 GET으로 감싸서 보내는 로직입니다.
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://playentry.org/api/getUserByUsername/${id}`)}`);
            const json = await response.json();
            const data = JSON.parse(json.contents);

            if(!data || data.error) {
                alert("유저를 찾을 수 없습니다.");
            } else {
                document.getElementById('res').style.display = 'block';
                document.getElementById('nick').innerText = data.nickname;
                document.getElementById('fol').innerText = data.followerCount.toLocaleString();
                document.getElementById('ing').innerText = data.followingCount.toLocaleString();
                document.getElementById('uid').innerText = data._id;
            }
        } catch (e) {
            alert("연결 오류! 아이디를 확인하거나 잠시 후 다시 시도하세요.");
        } finally {
            btn.innerText = "데이터 조회";
        }
    }
</script>

</body>
</html>
