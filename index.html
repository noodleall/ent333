<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ent333 | 검색 엔진</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #111; color: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #222; padding: 30px; border-radius: 15px; width: 350px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { color: #00ff88; text-align: center; font-size: 24px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #00ff88; color: #000; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; }
        #result { margin-top: 20px; display: none; padding: 15px; background: #1a1a1a; border-radius: 10px; border: 1px dotted #444; }
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .val { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>ent333 조회기</h1>
    <input type="text" id="userInput" placeholder="엔트리 아이디(Username) 입력">
    <button onclick="fetchData()" id="mainBtn">데이터 털기</button>

    <div id="result">
        <div class="row"><span>닉네임</span><span class="val" id="nick">-</span></div>
        <div class="row"><span>팔로워</span><span class="val" id="follower">-</span></div>
        <div class="row"><span>팔로잉</span><span class="val" id="following">-</span></div>
        <div class="row"><span>작품 수</span><span class="val" id="project">-</span></div>
        <div class="row"><span>게시글</span><span class="val" id="discuss">-</span></div>
    </div>
</div>

<script>
    async function fetchData() {
        const input = document.getElementById('userInput').value;
        const btn = document.getElementById('mainBtn');
        if(!input) return alert("아이디를 적어주세요!");

        btn.innerText = "데이터 추적 중...";
        btn.disabled = true;

        try {
            // 1단계: 아이디(Username)로 유저 정보(고유 ID 포함) 검색
            const searchUrl = `https://playentry.org/api/getUserByUsername/${input}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(searchUrl)}`;
            
            const res = await fetch(proxyUrl);
            const json = await res.json();
            const userData = JSON.parse(json.contents);

            if(!userData || userData.error || !userData._id) {
                throw new Error("User not found");
            }

            // 2단계: 가져온 데이터를 화면에 뿌리기
            // (이미 1단계 결과에 많은 정보가 포함되어 있어 바로 출력 가능합니다)
            document.getElementById('result').style.display = 'block';
            document.getElementById('nick').innerText = userData.nickname;
            document.getElementById('follower').innerText = userData.followerCount.toLocaleString();
            document.getElementById('following').innerText = userData.followingCount.toLocaleString();
            document.getElementById('project').innerText = userData.projectCount.toLocaleString();
            document.getElementById('discuss').innerText = userData.discussCount.toLocaleString();

        } catch (e) {
            alert("조회 실패! 아이디가 틀렸거나 엔트리 서버가 응답하지 않습니다.");
        } finally {
            btn.innerText = "데이터 털기";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
