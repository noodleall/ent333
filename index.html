<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ent333 | 실시간 데이터 조회</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; text-align: center; border: 1px solid #334155; }
        h1 { color: #38bdf8; margin-bottom: 20px; font-size: 28px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #7dd3fc; }
        #result { margin-top: 25px; text-align: left; display: none; background: #334155; padding: 15px; border-radius: 12px; }
        .item { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #475569; padding-bottom: 5px; }
        .label { color: #94a3b8; font-size: 14px; }
        .val { font-weight: bold; color: #f8fafc; }
    </style>
</head>
<body>

<div class="box">
    <h1>ent333</h1>
    <input type="text" id="username" placeholder="엔트리 아이디 입력" onkeypress="if(event.keyCode==13) search()">
    <button onclick="search()" id="btn">데이터 가져오기</button>

    <div id="result">
        <div class="item"><span class="label">닉네임</span><span class="val" id="res-nick">-</span></div>
        <div class="item"><span class="label">팔로워</span><span class="val" id="res-fol">-</span></div>
        <div class="item"><span class="label">작품 수</span><span class="val" id="res-prj">-</span></div>
        <div class="item"><span class="label">게시글 수</span><span class="val" id="res-post">-</span></div>
    </div>
</div>

<script>
    async function search() {
        const username = document.getElementById('username').value;
        const btn = document.getElementById('btn');
        if(!username) return alert("아이디를 입력하세요!");

        btn.innerText = "데이터 털어오는 중...";
        btn.disabled = true;

        // 엔트리 API 주소
        const target = `https://playentry.org/api/getUserByUsername/${username}`;
        // CORS 보안을 뚫어주는 무료 프록시 주소 (AllOrigins)
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;

        try {
            const response = await fetch(proxy);
            const json = await response.json();
            
            // 프록시를 거치면 데이터가 'contents'라는 문자열 안에 담겨서 옵니다.
            const data = JSON.parse(json.contents);

            if(!data || data.error || !data.nickname) {
                alert("존재하지 않는 유저입니다.");
            } else {
                document.getElementById('result').style.display = 'block';
                document.getElementById('res-nick').innerText = data.nickname;
                document.getElementById('res-fol').innerText = data.followerCount.toLocaleString();
                document.getElementById('res-prj').innerText = data.projectCount.toLocaleString();
                document.getElementById('res-post').innerText = data.discussCount.toLocaleString();
            }
        } catch (e) {
            alert("연결 실패! 프록시 서버가 바쁘거나 아이디가 잘못되었습니다.");
            console.error(e);
        } finally {
            btn.innerText = "데이터 가져오기";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
