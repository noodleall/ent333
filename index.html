<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ent333 | 최신 데이터 터미널</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #050505; color: #00ff41; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { border: 1px solid #00ff41; padding: 30px; border-radius: 5px; width: 320px; box-shadow: 0 0 15px rgba(0,255,65,0.2); }
        h1 { text-align: center; font-size: 22px; text-shadow: 0 0 10px #00ff41; }
        .input-group { margin: 20px 0; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid #00ff41; color: #00ff41; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 10px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; }
        #res { margin-top: 20px; padding: 15px; border-top: 1px dashed #00ff41; display: none; font-size: 14px; }
        .line { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .label { color: #008f11; }
    </style>
</head>
<body>

<div class="box">
    <h1>ENT333 SYSTEM</h1>
    <div class="input-group">
        <input type="text" id="targetId" placeholder="엔트리 아이디(ID) 입력">
    </div>
    <button onclick="access()">데이터 접속</button>

    <div id="res">
        <div class="line"><span class="label">NICKNAME</span> <span id="n">-</span></div>
        <div class="line"><span class="label">FOLLOWERS</span> <span id="f">-</span></div>
        <div class="line"><span class="label">FOLLOWING</span> <span id="i">-</span></div>
        <div class="line"><span class="label">PROJECTS</span> <span id="p">-</span></div>
    </div>
</div>

<script>
    async function access() {
        const id = document.getElementById('targetId').value;
        if(!id) return;
        
        const btn = document.querySelector('button');
        btn.innerText = "ACCESSING...";
        
        // 차단이 심한 allorigins 대신 직접적인 엔트리 API 우회 경로 사용
        // 아래 주소는 엔트리 공식 API를 브라우저 보안 없이 쏴주는 무료 프록시 주소입니다.
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent('https://playentry.org/api/getUserByUsername/' + id)}`;

        try {
            const response = await fetch(proxyUrl);
            const data = await response.json();

            if(data && data.nickname) {
                document.getElementById('res').style.display = 'block';
                document.getElementById('n').innerText = data.nickname;
                document.getElementById('f').innerText = data.followerCount;
                document.getElementById('i').innerText = data.followingCount;
                document.getElementById('p').innerText = data.projectCount;
            } else {
                alert("아이디를 찾을 수 없습니다.");
            }
        } catch (e) {
            alert("연결 실패! 브라우저가 프록시를 차단했습니다. \n(F12 콘솔창의 오류를 확인해 보세요)");
        } finally {
            btn.innerText = "데이터 접속";
        }
    }
</script>

</body>
</html>
